spring.application.name=irm

spring.datasource.url=jdbc:mysql://172.16.51.88:3306/dgft_db3
spring.datasource.username=htctrnguser
spring.datasource.password=12345Welcome

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect



spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB



spring.quartz.job-store-type=memory

spring.quartz.properties.org.quartz.scheduler.instanceName=DGFTScheduler
spring.quartz.properties.org.quartz.threadPool.threadCount=5


dgft.csv.inbound-path=./data/inbound
dgft.csv.processed-path=./data/processed
dgft.csv.ack-path=./data/ack

dgft.csv.batch-size=20
dgft.csv.delimiter=|
dgft.csv.date-format=dd/MM/yyyy


dgft.validation.cutoff-date=2000-01-01


# dgft.quartz.cron=0 */5 * * * ?
dgft.quartz.cron=0 * * * * ?


dgft.scheduler.irm-push.enabled=true
#  2 mins
# dgft.scheduler.irm-push.cron=0 */2 * * * * 

#  1 min
dgft.scheduler.irm-push.cron=0 * * * * * 


dgft.audit.system-user=SYSTEM_BATCH

logging.level.root=INFO
logging.level.com.dgft.irm=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE


spring.profiles.active=mock