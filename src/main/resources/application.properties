spring.application.name=irm

spring.datasource.url=jdbc:mysql://172.16.51.88:3306/dgft_db3
spring.datasource.username=htctrnguser
spring.datasource.password=12345Welcome

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.profiles.active=mock
dgft.csv.inbound-path=./data/inbound
dgft.csv.processed-path=./data/processed
dgft.csv.ack-path=./data/ack
dgft.csv.batch-size=20
dgft.csv.delimiter=|
dgft.csv.date-format=dd/MM/yyyy

dgft.validation.cutoff-date=2000-01-01

# =====================================================================
# File upload (multipart)
# =====================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
 
# =====================================================================
# Quartz (CSV Ingestion)
# =====================================================================
# Every 30 seconds
dgft.quartz.cron=0/30 * * * * ?

# =====================================================================
# Step 2 - IRM Push Scheduler
# =====================================================================
# Every 40 seconds
dgft.scheduler.irm-push.enabled=true
dgft.scheduler.irm-push.cron=10/40 * * * * *

dgft.scheduler.irm-push.batch-size=20
dgft.scheduler.irm-push.max-wait-minutes=1

# =====================================================================
# Step 3 - DGFT API Push Scheduler
# =====================================================================
# Every 50 seconds
dgft.scheduler.irm-api-push.enabled=true
dgft.scheduler.irm-api-push.cron=20/50 * * * * *

# =====================================================================
# Step 4 - DGFT Enquiry Scheduler
# =====================================================================
# Every 1 minute
dgft.scheduler.irm-enquiry.enabled=true
dgft.scheduler.irm-enquiry.cron=0 * * * * *

# =====================================================================
# Step 5 - Processed Status Scheduler
# =====================================================================
# Every 1 minute 10 seconds
dgft.scheduler.irm-processed-status.enabled=true
dgft.scheduler.irm-processed-status.cron=10 * * * * *
# Audit
# =====================================================================
dgft.audit.system-user=SYSTEM_BATCH
 
# =====================================================================
# Logging
# =====================================================================
logging.level.root=INFO
logging.level.com.dgft.irm=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE



